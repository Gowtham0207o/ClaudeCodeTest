<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Scraper Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls input,
        .controls select,
        .controls button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .controls input,
        .controls select {
            flex: 1;
            min-width: 150px;
        }

        .controls button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .job-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .job-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .job-company {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .job-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .job-location {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .job-source {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .source-angellist { background: #1877f2; }
        .source-remoteok { background: #ff6b6b; }
        .source-indeed { background: #0a66c2; }
        .source-glassdoor { background: #0cba38; }
        .source-linkedin { background: #0a66c2; }
        .source-instahyre { background: #ff9500; }

        .job-skills {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .skill {
            display: inline-block;
            background: #e8eaf6;
            color: #667eea;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 4px;
            font-size: 11px;
        }

        .job-url {
            margin-top: 12px;
        }

        .job-url a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
        }

        .job-url a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .no-jobs {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }

        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: white;
            color: #667eea;
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .pagination button:hover,
        .pagination button.active {
            background: #667eea;
            color: white;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }

            .controls input,
            .controls select {
                width: 100%;
            }

            .jobs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 Job Scraper Dashboard</h1>
            <p>Real-time job listings from 6 sources</p>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalJobs">0</div>
                    <div class="stat-label">Total Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="remoteJobs">0</div>
                    <div class="stat-label">Remote Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sourcesCount">6</div>
                    <div class="stat-label">Job Sources</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="lastUpdated">--:--</div>
                    <div class="stat-label">Last Updated</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search by title or company...">

            <select id="sourceFilter">
                <option value="">All Sources</option>
                <option value="angellist">AngelList</option>
                <option value="remoteok">RemoteOK</option>
                <option value="indeed">Indeed</option>
                <option value="glassdoor">Glassdoor</option>
                <option value="linkedin">LinkedIn</option>
                <option value="instahyre">InstaHyre</option>
            </select>

            <select id="locationFilter">
                <option value="">All Locations</option>
                <option value="Remote">Remote Only</option>
            </select>

            <button onclick="loadJobs()">🔄 Refresh</button>
        </div>

        <!-- Error Message -->
        <div id="error" style="display: none;" class="error"></div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">Loading jobs...</div>

        <!-- Jobs Grid -->
        <div id="jobsContainer" class="jobs-grid"></div>

        <!-- No Jobs Message -->
        <div id="noJobs" class="no-jobs" style="display: none;">
            No jobs found. Try adjusting your filters.
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration
        // Fill in with your own Firebase web config (kept out of git).
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // State
        let allJobs = [];
        let filteredJobs = [];
        let currentPage = 1;
        const jobsPerPage = 12;

        // Load jobs from Firebase
        async function loadJobs() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                const snapshot = await db.collection('jobs').get();
                allJobs = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                // Update stats
                updateStats();

                // Apply filters and display
                applyFilters();

                // Update last updated time
                const now = new Date();
                document.getElementById('lastUpdated').textContent =
                    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                loading.style.display = 'none';
            } catch (err) {
                console.error('Error loading jobs:', err);
                error.textContent = '❌ Error loading jobs: ' + err.message;
                error.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalJobs').textContent = allJobs.length;
            const remoteCount = allJobs.filter(job =>
                job.location && job.location.toLowerCase().includes('remote')
            ).length;
            document.getElementById('remoteJobs').textContent = remoteCount;
        }

        // Apply filters
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sourceFilter = document.getElementById('sourceFilter').value;
            const locationFilter = document.getElementById('locationFilter').value;

            filteredJobs = allJobs.filter(job => {
                const matchesSearch = !searchTerm ||
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm);

                const matchesSource = !sourceFilter || job.source === sourceFilter;

                const matchesLocation = !locationFilter ||
                    job.location.toLowerCase().includes('remote');

                return matchesSearch && matchesSource && matchesLocation;
            });

            currentPage = 1;
            displayJobs();
        }

        // Display jobs with pagination
        function displayJobs() {
            const container = document.getElementById('jobsContainer');
            const noJobs = document.getElementById('noJobs');
            const pagination = document.getElementById('pagination');

            if (filteredJobs.length === 0) {
                container.innerHTML = '';
                noJobs.style.display = 'block';
                pagination.innerHTML = '';
                return;
            }

            noJobs.style.display = 'none';
            const start = (currentPage - 1) * jobsPerPage;
            const end = start + jobsPerPage;
            const paginatedJobs = filteredJobs.slice(start, end);

            // Display jobs
            container.innerHTML = paginatedJobs.map(job => `
                <div class="job-card">
                    <div class="job-title">${job.title}</div>
                    <div class="job-company">🏢 ${job.company}</div>
                    <div class="job-meta">
                        📅 ${new Date(job.postedDate).toLocaleDateString()}
                    </div>

                    <div>
                        <span class="job-location">📍 ${job.location || 'Remote'}</span>
                        <span class="job-source source-${job.source}">${job.source.toUpperCase()}</span>
                    </div>

                    ${job.requiredExperience && job.requiredExperience !== 'Not specified' ? `
                        <div class="job-meta">⏳ ${job.requiredExperience}</div>
                    ` : ''}

                    ${job.requiredSkills && job.requiredSkills.length > 0 ? `
                        <div class="job-skills">
                            ${job.requiredSkills.slice(0, 5).map(skill =>
                                `<span class="skill">${skill}</span>`
                            ).join('')}
                            ${job.requiredSkills.length > 5 ?
                                `<span class="skill">+${job.requiredSkills.length - 5} more</span>` : ''
                            }
                        </div>
                    ` : ''}

                    ${job.jobUrl ? `
                        <div class="job-url">
                            <a href="${job.jobUrl}" target="_blank">View Job →</a>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            // Display pagination
            const totalPages = Math.ceil(filteredJobs.length / jobsPerPage);
            if (totalPages > 1) {
                pagination.innerHTML = Array.from({ length: totalPages }, (_, i) => i + 1)
                    .map(page => `
                        <button
                            onclick="goToPage(${page})"
                            class="${page === currentPage ? 'active' : ''}"
                        >
                            ${page}
                        </button>
                    `).join('');
            } else {
                pagination.innerHTML = '';
            }
        }

        // Pagination
        function goToPage(page) {
            currentPage = page;
            displayJobs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('sourceFilter').addEventListener('change', applyFilters);
        document.getElementById('locationFilter').addEventListener('change', applyFilters);

        // Load jobs on page load
        window.addEventListener('load', loadJobs);
    </script>
</body>
</html>
